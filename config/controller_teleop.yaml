teleop_twist_joy_node:
  ros__parameters:
    # Hold RB (button 5) to enable movement — deadman switch
    require_enable_button: true
    enable_button: 5           # RB
    enable_turbo_button: -1    # Disabled — button 4 reserved for estop

    # Deadzone prevents joystick drift
    deadzone: 0.1

    # Linear axis: left stick vertical
    axis_linear:
      x: 1      # axes[1] = left stick vertical
      y: -1
      z: -1

    # Normal speed — conservative for sim testing
    # Raise scale_linear.x toward 0.5 once steering is confirmed working
    scale_linear:
      x: 0.6    # m/s forward/backward
      y: 0.0
      z: 0.0

    # Turbo (enable_turbo_button = -1 so this is never triggered,
    # but values must be sane in case turbo is re-enabled later)
    scale_linear_turbo:
      x: 0.6
      y: 0.0
      z: 0.0

    # Angular axis: right stick horizontal
    # PS4: axes[3]   F310: axes[0]
    # Set to 3 for PS4. Change to 0 if using F310 in sim.
    axis_angular:
      yaw: 3
      pitch: -1
      roll: -1

    # Angular scaling — 0.5 rad/s gives visible turns in sim
    scale_angular:
      yaw: 0.5
      pitch: 0.0
      roll: 0.0

    scale_angular_turbo:
      yaw: 1.0
      pitch: 0.0
      roll: 0.0

    inverted_reverse: false
    publish_stamped_twist: false
    frame: "teleop_twist_joy"